<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>親子ワクワクAI診断</title>
  <style>
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #fff8f0;
      color: #333;
      text-align: center;
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    h1 {
      color: #ff8aa1;
      margin-bottom: 10px;
    }
    .intro {
      font-size: 14px;
      color: #666;
      margin-bottom: 30px;
    }
    .question {
      margin: 30px 0;
      text-align: left;
    }
    .question h3 {
      text-align: center;
      color: #333;
      margin-bottom: 20px;
    }
    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .option-label {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #fff;
      border: 2px solid #ffd9e0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .option-label:hover {
      background: #fff0f5;
      border-color: #ffb8c6;
    }
    .option-label input[type="checkbox"] {
      margin-right: 12px;
      width: 20px;
      height: 20px;
      cursor: pointer;
    }
    .option-label input[type="checkbox"]:checked + span {
      color: #ff8aa1;
      font-weight: bold;
    }
    .navigation {
      display: flex;
      gap: 10px;
      margin-top: 30px;
      justify-content: center;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      background: #ffd9e0;
      color: #333;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover {
      background: #ffb8c6;
    }
    button:disabled {
      background: #e0e0e0;
      cursor: not-allowed;
    }
    .progress {
      text-align: center;
      font-size: 14px;
      color: #999;
      margin-bottom: 20px;
    }
    #result {
      margin-top: 30px;
      font-size: 18px;
      color: #444;
    }
    .line-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      background-color: #00c300;
      color: white;
      font-size: 18px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: bold;
    }
    .line-btn:hover {
      background-color: #009d00;
    }
    .step-box {
      background: #fff0f5;
      padding: 20px;
      border-radius: 15px;
      margin: 20px auto;
      max-width: 500px;
      border: 2px solid #ffb8c6;
    }
    .step-box p {
      margin: 10px 0;
      font-size: 16px;
    }
    .step-box strong {
      color: #ff8aa1;
    }
    .type-chart {
      margin: 20px 0;
      padding: 15px;
      background: #fff;
      border-radius: 12px;
    }
    .type-bar {
      margin: 10px 0;
      text-align: left;
    }
    .type-label {
      font-weight: bold;
      margin-bottom: 5px;
      color: #333;
    }
    .bar-container {
      background: #f0f0f0;
      border-radius: 10px;
      overflow: hidden;
      height: 30px;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 10px;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }
    .bar-A { background: linear-gradient(90deg, #0ea5a3, #06b6d4); }
    .bar-B { background: linear-gradient(90deg, #f59e0b, #f97316); }
    .bar-C { background: linear-gradient(90deg, #ec4899, #f43f5e); }
    .bar-D { background: linear-gradient(90deg, #a855f7, #d946ef); }
    .back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #f0f0f0;
      color: #333;
      text-decoration: none;
      border-radius: 20px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <h1>🌟 親子ワクワクAI診断 🌟</h1>
  <p class="intro">当てはまるもの、いくつでも選んでね！</p>
  
  <div class="progress" id="progress"></div>
  <div id="quiz"></div>
  <div id="result"></div>

  <script>
    const questions = [
      {
        q: "Q1. 自由時間、いちばん楽しいのは？",
        options: [
          { text: "お話や物語を考える", types: ["A"] },
          { text: "図や仕組みをまとめる", types: ["B"] },
          { text: "キャラになりきって遊ぶ", types: ["A", "C"] },
          { text: "絵や色で表現する", types: ["D"] },
          { text: "体を動かす", types: ["D"] },
          { text: "ルールのあるゲーム", types: ["B"] }
        ]
      },
      {
        q: "Q2. ほめられるとうれしいのは？",
        options: [
          { text: "アイデアがすごいね！", types: ["A"] },
          { text: "丁寧で分かりやすいね", types: ["B"] },
          { text: "発表すごく上手だったね！", types: ["C"] },
          { text: "色づかいや表現がきれい！", types: ["D"] },
          { text: "きれいに動いてるね！", types: ["D"] },
          { text: "体を使うのが上手だね！", types: ["D", "C"] }
        ]
      },
      {
        q: "Q3. 好きな授業は？",
        options: [
          { text: "国語・作文・創作", types: ["A"] },
          { text: "理科・自由研究", types: ["B"] },
          { text: "音読・発表・演劇", types: ["C"] },
          { text: "美術・音楽", types: ["D"] },
          { text: "体育・スポーツ", types: ["D", "C"] },
          { text: "社会・歴史", types: ["B"] }
        ]
      },
      {
        q: "Q4. 気になる言葉は？",
        options: [
          { text: "ひらめき💡", types: ["A"] },
          { text: "じっくり🔍", types: ["B"] },
          { text: "なりきり🎤", types: ["C"] },
          { text: "感じる🌈", types: ["D"] },
          { text: "スッキリ💨", types: ["D"] },
          { text: "チームワーク👥", types: ["C"] }
        ]
      },
      {
        q: "Q5. もしAIと遊べるなら？",
        options: [
          { text: "お話を一緒に作りたい", types: ["A"] },
          { text: "調べ物を手伝ってもらいたい", types: ["B"] },
          { text: "動画を一緒につくりたい", types: ["C"] },
          { text: "絵や音楽を一緒に作りたい", types: ["D"] },
          { text: "遊びのルール考えてもらいたい", types: ["B"] },
          { text: "体操や運動を教えてもらいたい", types: ["D"] }
        ]
      },
      {
        q: "Q6. 好きな遊び方は？",
        options: [
          { text: "ごっこ遊びのストーリー作り", types: ["A"] },
          { text: "観察してメモをとる", types: ["B"] },
          { text: "発表やショータイムで盛り上がる", types: ["C"] },
          { text: "色や形で自分を表現する", types: ["D"] },
          { text: "体を動かしてモヤモヤをスッキリさせる", types: ["D"] },
          { text: "自分の体が思い通りに動く感覚", types: ["D"] },
          { text: "ルールと作戦を考える", types: ["B"] },
          { text: "みんなで一緒に何かやる", types: ["C"] }
        ]
      },
      {
        q: "Q7. やってみたい！と思うのは？",
        options: [
          { text: "AIで自分の話をつくる", types: ["A"] },
          { text: "AIで自由研究まとめ", types: ["B"] },
          { text: "AIで動画づくり", types: ["C"] },
          { text: "AIで絵や色を作って遊ぶ", types: ["D"] },
          { text: "AIでスポーツ上達サポート", types: ["D"] },
          { text: "AIでチームゲーム作る", types: ["B", "C"] }
        ]
      },
      {
        q: "Q8. 友達に言われたい言葉は？",
        options: [
          { text: "ストーリーが面白い！", types: ["A"] },
          { text: "知ってて物知り！", types: ["B"] },
          { text: "発表が最高！", types: ["C"] },
          { text: "絵がステキ！", types: ["D"] },
          { text: "動きがきれい！", types: ["D"] },
          { text: "チームの柱だね！", types: ["C"] }
        ]
      }
    ];

    let current = 0;
    const scores = { A: 0, B: 0, C: 0, D: 0 };
    const quiz = document.getElementById("quiz");
    const result = document.getElementById("result");
    const progress = document.getElementById("progress");

    function showQuestion() {
      const q = questions[current];
      progress.innerHTML = `Q${current + 1} / ${questions.length}`;
      
      const optionsHTML = q.options.map((opt, i) => `
        <label class="option-label">
          <input type="checkbox" name="option${i}">
          <span>${opt.text}</span>
        </label>
      `).join("");

      quiz.innerHTML = `
        <div class='question'>
          <h3>${q.q}</h3>
          <div class='options'>
            ${optionsHTML}
          </div>
        </div>
      `;
    }

    function nextQuestion() {
      const q = questions[current];
      const checkedBoxes = document.querySelectorAll('input[type="checkbox"]:checked');
      
      checkedBoxes.forEach(checkbox => {
        const index = Array.from(document.querySelectorAll('input[type="checkbox"]')).indexOf(checkbox);
        const types = q.options[index].types;
        types.forEach(type => {
          scores[type]++;
        });
      });

      current++;
      if (current < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function showResult() {
      const sortedScores = Object.entries(scores).sort((a, b) => b[1] - a[1]);
      const mainType = sortedScores[0][0];
      
      const typeLabels = {
        A: "モコモコタイプ（発想クリエイター）",
        B: "コツコツタイプ（観察マスター）",
        C: "ワクワクタイプ（表現チャレンジャー）",
        D: "キラキラタイプ（感覚アーティスト）"
      };
      
      const messages = {
        A: "想像力が豊かで、ひらめきやお話づくりが大好きなタイプ！",
        B: "じっくり集中して、まとめるのが得意なタイプ！",
        C: "なりきったり発表したり、表現が得意なタイプ！",
        D: "感性が鋭く、色や音、身体感覚で表現するのが好きなタイプ！"
      };

      const maxScore = Math.max(...sortedScores.map(s => s[1]));
      const hybridTypes = sortedScores.filter(s => s[1] >= mainType - 1).map(s => s[0]);

      let resultHTML = `
        <p>🎉 あなたは <strong>${typeLabels[mainType]}</strong>！</p>
        <p>${messages[mainType]}</p>
      `;

      if (hybridTypes.length > 1) {
        resultHTML += `<p style="color: #ff8aa1; font-size: 16px;">複数のタイプの特徴を持つ、ハイブリッドタイプですね！</p>`;
      }

      resultHTML += `<div class="type-chart">`;
      sortedScores.forEach(([type, score]) => {
        const barWidth = (score / maxScore) * 100;
        resultHTML += `
          <div class="type-bar">
            <div class="type-label">${typeLabels[type]}</div>
            <div class="bar-container">
              <div class="bar-fill bar-${type}" style="width: ${barWidth}%">${score}</div>
            </div>
          </div>
        `;
      });
      resultHTML += `</div>`;

      resultHTML += `
        <div class="step-box">
          <p style="font-weight: bold; color: #ff8aa1; font-size: 18px;">📲 次のステップ</p>
          <p>1️⃣ 下のボタンからLINE公式を友達追加</p>
          <p>2️⃣ <strong style="font-size: 20px;">${mainType}</strong> とメッセージ送信</p>
          <p>3️⃣ のりこおばちゃんからの<br/>アドバイス画像と<br/>OpenChatリンクが届くよ！</p>
        </div>
        <a href='https://lin.ee/pm64uW8' class='line-btn' target='_blank'>💚 LINE公式を友達追加</a>
        <a href='./' class='back-btn'>← トップに戻る</a>
      `;

      quiz.innerHTML = "";
      result.innerHTML = resultHTML;
      progress.innerHTML = "";
    }

    function prevQuestion() {
      if (current > 0) {
        current--;
        showQuestion();
      }
    }

    function renderNavigation() {
      let navHTML = `<div class="navigation">`;
      if (current > 0) {
        navHTML += `<button onclick="prevQuestion()">← 前へ</button>`;
      }
      navHTML += `<button onclick="nextQuestion()">次へ →</button>`;
      navHTML += `</div>`;
      
      const navDiv = document.querySelector('.navigation') || document.createElement('div');
      navDiv.innerHTML = navHTML;
      navDiv.className = 'navigation';
      if (!document.querySelector('.navigation')) {
        document.body.appendChild(navDiv);
      }
    }

    showQuestion();
    renderNavigation();
  </script>
</body>
</html>
