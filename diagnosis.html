<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>親子ワクワクAI診断</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: linear-gradient(135deg, #fff8f0 0%, #fffbf5 100%);
      color: #333;
    }
    header {
      background: linear-gradient(90deg, #0ea5a3, #fb7185);
      color: white;
      padding: 20px;
      text-align: center;
    }
    header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }
    .container {
      max-width: 700px;
      margin: 30px auto;
      padding: 20px;
    }
    .question-section {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      margin: 20px 0;
    }
    .question-number {
      color: #0ea5a3;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .question-text {
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 20px;
      color: #333;
    }
    .checkbox-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .checkbox-item {
      display: flex;
      align-items: center;
    }
    .checkbox-item input {
      width: 20px;
      height: 20px;
      margin-right: 12px;
      cursor: pointer;
    }
    .checkbox-item label {
      cursor: pointer;
      font-size: 15px;
      flex: 1;
    }
    .nav-buttons {
      display: flex;
      gap: 10px;
      margin-top: 25px;
      justify-content: space-between;
    }
    .btn {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-prev {
      background: #ccc;
      color: #333;
    }
    .btn-prev:hover {
      background: #999;
    }
    .btn-next {
      background: linear-gradient(90deg, #0ea5a3, #fb7185);
      color: white;
    }
    .btn-next:hover {
      transform: scale(1.05);
    }
    .result-section {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 25px rgba(0, 0, 0, 0.08);
      text-align: center;
    }
    .result-title {
      font-size: 24px;
      color: #0ea5a3;
      margin-bottom: 20px;
      font-weight: bold;
    }
    .type-result {
      background: linear-gradient(135deg, #f0f9ff 0%, #fff0f5 100%);
      padding: 20px;
      border-radius: 12px;
      margin: 15px 0;
    }
    .type-name {
      font-size: 20px;
      color: #fb7185;
      font-weight: bold;
      margin-bottom: 8px;
    }
    .type-desc {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }
    .score-bar {
      background: #ddd;
      height: 20px;
      border-radius: 10px;
      overflow: hidden;
      margin: 10px 0;
    }
    .score-fill {
      height: 100%;
      background: linear-gradient(90deg, #0ea5a3, #fb7185);
    }
    .next-step {
      background: #fff0f5;
      border-left: 5px solid #fb7185;
      padding: 20px;
      border-radius: 8px;
      margin-top: 25px;
      text-align: left;
    }
    .next-step h3 {
      color: #fb7185;
      margin-bottom: 12px;
      font-size: 16px;
    }
    .next-step p {
      font-size: 14px;
      line-height: 1.8;
      margin-bottom: 15px;
    }
    .line-button {
      display: inline-block;
      background: linear-gradient(90deg, #0ea5a3, #fb7185);
      color: white;
      padding: 12px 25px;
      border-radius: 20px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      margin-right: 10px;
    }
    .line-button:hover {
      transform: scale(1.05);
    }
    .back-link {
      text-align: center;
      margin-top: 30px;
    }
    .back-link a {
      color: #0ea5a3;
      text-decoration: none;
      font-weight: bold;
    }
    .hidden {
      display: none;
    }
    .progress {
      background: #ddd;
      height: 4px;
      margin-bottom: 20px;
      border-radius: 2px;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #0ea5a3, #fb7185);
    }
  </style>
</head>
<body>
  <header>
    <h1>🌟 親子ワクワクAI診断 🌟</h1>
    <p>あなたのお子さんはどのタイプ？</p>
  </header>

  <div class="container">
    <div id="quiz-section">
      <div class="progress">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div id="questions-container"></div>
      <div class="nav-buttons">
        <button class="btn btn-prev" id="btn-prev" onclick="prevQuestion()">← 前へ</button>
        <button class="btn btn-next" id="btn-next" onclick="nextQuestion()">次へ →</button>
      </div>
    </div>

    <div id="result-section" class="hidden">
      <div class="result-section">
        <div class="result-title">📊 診断結果</div>
        <div id="result-content"></div>
        <div class="next-step">
          <h3>📱 次のステップ</h3>
          <p>診断結果をLINE公式に送信して、のりこおばちゃんから個別アドバイスを受け取ってください！</p>
          <a href="https://lin.ee/pm64uW8" class="line-button" target="_blank">💚 LINE公式に登録</a>
        </div>
        <div class="back-link">
          <a href="./">← トップに戻る</a>
        </div>
      </div>
    </div>
  </div>

  <script>
    const questions = [
      {
        text: "Q1. お子さんはお話を作ったり、ものごとを想像したりするのが好きですか？",
        types: { A: 1, B: 0, C: 0, D: 0 }
      },
      {
        text: "Q2. 細かいところまでよく観察して、じっくり物事に取り組みますか？",
        types: { A: 0, B: 1, C: 0, D: 0 }
      },
      {
        text: "Q3. お子さんは表現することや、みんなの前で発表するのが好きですか？",
        types: { A: 0, B: 0, C: 1, D: 0 }
      },
      {
        text: "Q4. 色や音、感覚的なものに敏感で、表現するのが得意ですか？",
        types: { A: 0, B: 0, C: 0, D: 1 }
      },
      {
        text: "Q5. 新しいアイデアやひらめきが得意で、創造的ですか？",
        types: { A: 1, B: 0, C: 0, D: 0 }
      },
      {
        text: "Q6. コツコツ続けることや、ルールを守ることが得意ですか？",
        types: { A: 0, B: 1, C: 0, D: 0 }
      },
      {
        text: "Q7. 人前でのパフォーマンスや、自分を表現することが得意ですか？",
        types: { A: 0, B: 0, C: 1, D: 0 }
      },
      {
        text: "Q8. 美しいもの、珍しいものに惹かれて、それを表現したいと思いますか？",
        types: { A: 0, B: 0, C: 0, D: 1 }
      }
    ];

    const typeInfo = {
      A: {
        name: "📖 モコモコ型（発想クリエイター）",
        desc: "想像力が豊かで、ひらめきやお話づくりが好き。新しいアイデアを生み出すのが得意です。"
      },
      B: {
        name: "📊 コツコツ型（観察マスター）",
        desc: "じっくり集中して、細部をよく観察できます。コツコツ続けることが得意で、整理整頓も上手です。"
      },
      C: {
        name: "🎤 ワクワク型（表現チャレンジャー）",
        desc: "なりきったり発表したり、表現することが得意。みんなを笑顔にする力を持っています。"
      },
      D: {
        name: "🌈 キラキラ型（感覚アーティスト）",
        desc: "色や音、身体感覚で表現するのが好き。美しいものや新しい感覚に敏感です。"
      }
    };

    let currentQuestion = 0;
    const answers = {};

    function renderQuestion() {
      const container = document.getElementById('questions-container');
      const question = questions[currentQuestion];
      
      container.innerHTML = `
        <div class="question-section">
          <div class="question-number">Q${currentQuestion + 1} / 8</div>
          <div class="question-text">${question.text}</div>
          <div class="checkbox-group">
            <div class="checkbox-item">
              <input type="checkbox" id="yes" ${answers[currentQuestion]?.yes ? 'checked' : ''}>
              <label for="yes">はい</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="somewhat" ${answers[currentQuestion]?.somewhat ? 'checked' : ''}>
              <label for="somewhat">まあそう</label>
            </div>
            <div class="checkbox-item">
              <input type="checkbox" id="no" ${answers[currentQuestion]?.no ? 'checked' : ''}>
              <label for="no">いいえ</label>
            </div>
          </div>
        </div>
      `;

      document.getElementById('btn-prev').style.display = currentQuestion === 0 ? 'none' : 'block';
      updateProgress();
    }

    function updateProgress() {
      const progress = ((currentQuestion + 1) / 8) * 100;
      document.getElementById('progress-fill').style.width = progress + '%';
    }

    function nextQuestion() {
      saveAnswer();
      if (currentQuestion < 7) {
        currentQuestion++;
        renderQuestion();
      } else {
        showResult();
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        renderQuestion();
      }
    }

    function saveAnswer() {
      if (!answers[currentQuestion]) answers[currentQuestion] = {};
      answers[currentQuestion].yes = document.getElementById('yes').checked;
      answers[currentQuestion].somewhat = document.getElementById('somewhat').checked;
      answers[currentQuestion].no = document.getElementById('no').checked;
    }

    function showResult() {
      const scores = { A: 0, B: 0, C: 0, D: 0 };

      for (let i = 0; i < 8; i++) {
        const answer = answers[i];
        if (answer?.yes) {
          const type = Object.keys(questions[i].types).find(t => questions[i].types[t] === 1);
          scores[type]++;
        }
      }

      const maxScore = Math.max(...Object.values(scores));
      const mainTypes = Object.keys(scores).filter(t => scores[t] === maxScore);

      let resultHTML = '';
      mainTypes.forEach(type => {
        resultHTML += `
          <div class="type-result">
            <div class="type-name">${typeInfo[type].name}</div>
            <div class="type-desc">${typeInfo[type].desc}</div>
            <div class="score-bar">
              <div class="score-fill" style="width: ${(scores[type] / 8) * 100}%"></div>
            </div>
          </div>
        `;
      });

      document.getElementById('result-content').innerHTML = resultHTML;
      document.getElementById('quiz-section').classList.add('hidden');
      document.getElementById('result-section').classList.remove('hidden');
    }

    renderQuestion();
  </script>
</body>
</html>
